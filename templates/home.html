<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Prediction</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        background:white;
        width:100%;
        max-width:700px;
        padding:35px;
        border-radius:15px;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        color:#333;
        margin-bottom:30px;
    }

    .form-group{
        margin-bottom:18px;
    }

    label{
        display:block;
        font-weight:bold;
        margin-bottom:8px;
        color:#444;
    }

    select,
    input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:15px;
    }

    select:focus,
    input:focus{
        outline:none;
        border-color:#667eea;
    }

    .btn{
        width:100%;
        background:#667eea;
        color:white;
        padding:14px;
        border:none;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    .btn:hover{
        background:#5563d6;
    }

    .result{
        margin-top:25px;
        padding:15px;
        text-align:center;
        background:#e8f5e9;
        border-radius:8px;
        color:#2e7d32;
        font-weight:bold;
        font-size:20px;
    }
</style>

</head>

<body>

<div class="container">

<h1>Student Exam Performance Indicator</h1>

<form action="/predictdata" method="post">

    <div class="form-group">
        <label>Gender</label>
        <select name="gender" required>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
    </div>

    <div class="form-group">
        <label>Race/Ethnicity</label>
        <select name="race_ethnicity" required>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
        </select>
    </div>

    <div class="form-group">
        <label>Parental Level of Education</label>
        <select name="parental_level_of_education" required>
            <option value="associate's degree">Associate's Degree</option>
            <option value="bachelor's degree">Bachelor's Degree</option>
            <option value="high school">High School</option>
            <option value="master's degree">Master's Degree</option>
            <option value="some college">Some College</option>
            <option value="some high school">Some High School</option>
        </select>
    </div>

    <div class="form-group">
        <label>Lunch</label>
        <select name="lunch" required>
            <option value="free/reduced">Free/Reduced</option>
            <option value="standard">Standard</option>
        </select>
    </div>

    <div class="form-group">
        <label>Test Preparation Course</label>
        <select name="test_preparation_course" required>
            <option value="none">None</option>
            <option value="completed">Completed</option>
        </select>
    </div>

    <div class="form-group">
        <label>Reading Score</label>
        <input type="number" name="reading_score" min="0" max="100" required>
    </div>

    <div class="form-group">
        <label>Writing Score</label>
        <input type="number" name="writing_score" min="0" max="100" required>
    </div>

    <button type="submit" class="btn">
        Predict Maths Score
    </button>

</form>

{% if results %}
    <div class="result">
        Predicted Maths Score: {{ results }}
    </div>
{% endif %}

</div>

</body>
</html>
